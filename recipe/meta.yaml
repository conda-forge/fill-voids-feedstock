{% set name = "fill-voids" %}
{% set version = "2.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fill_voids-{{ version }}.tar.gz
  sha256: 469f543e4ab236cf11aacef106af8e73c730f2a90f1bfae760dc8de29d4d6634

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - setuptools
    - numpy
    - pbr
    - pip
    - python
    - cython
  run:
    - python
    - numpy
    - fastremap

test:
  imports:
    - fill_voids
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/seung-lab/fill_voids
  summary: Fill holes in binary 2D & 3D images fast.
  license: LGPL-3.0-only
  license_file:
    - COPYING.LESSER
    - LICENSE-libdivide

extra:
  recipe-maintainers:
    - william-silversmith
    - stuarteberg
